services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: zeeus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeeus
      POSTGRES_PASSWORD: zeeus_password
      POSTGRES_DB: zeeus
    volumes:
      - zeeus-db-data:/var/lib/postgresql/data
      - ../zeeus-backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeeus -d zeeus"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Node.js/Express) ────────────────────────────────────────────────
  backend:
    build:
      context: ../zeeus-backend
      dockerfile: Dockerfile
    container_name: zeeus-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://zeeus:zeeus_password@db:5432/zeeus
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_changeme_in_production}
      GROQ_API_KEY: ${GROQ_API_KEY}
      PORT: 3001
    ports:
      - "3001:3001"

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ../zeeus-frontend
      dockerfile: Dockerfile
    container_name: zeeus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"

volumes:
  zeeus-db-data: